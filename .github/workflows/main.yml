name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer and Dependencies
        run: |
          pip install --user --upgrade buildozer
          pip install --user --upgrade Cython==0.29.33

      - name: Build with Buildozer
        run: |
          # بناء التطبيق مباشرة بدون حاوية Docker لتجنب مشاكل الصلاحيات
          ~/.local/bin/buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
