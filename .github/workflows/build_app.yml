name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          openjdk-17-jdk ant python3-pip

      - name: Install Buildozer
        run: pip install --upgrade buildozer cython==0.29.33

      - name: Build APK
        run: |
          buildozer android clean
          yes | buildozer -v android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      - name: Save APK
        uses: actions/upload-artifact@v4
        with:
          name: Nabil-Center-App
          path: bin/*.apk
